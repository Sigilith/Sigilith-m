<!DOCTYPE html>
<html>
<head>
    <title>Sigilith-M Dashboard</title>
</head>
<body>
    <h1>Sigilith-M Analysis Dashboard</h1>

    <h2>Submit Analysis</h2>
    <form method="post" action="/analyze">
        <label for="sequence">Sequence:</label>
        <input type="text" id="sequence" name="sequence" required>
        <input type="submit" value="Analyze">
    </form>

    <h2>Stored Analyses</h2>
    <ul>
        {% for item in analyses %}
            <li>
                <a href="/analysis/{{ item.id }}">{{ item.id }}</a>
                — {{ item.timestamp }}
            </li>
        {% endfor %}
    </ul>
</body>
</html>
