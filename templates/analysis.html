<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Analysis</title>\n    <script src=\"https://cdn.plot.ly/plotly-latest.min.js\"></script>\n</head>\n<body>\n    <h1>Interactive Risk Gauge</h1>\n    <div id=\"gauge\" style=\"width:480px;height:400px;\"></div>\n    <script>\n        var data = [\n            {\n                value: 0.5, // Set your risk value here\n                title: \"Risk Level\",\n                type: \"indicator\",\n                mode: \"gauge+number\",\n                gauge: {\n                    axis: {range: [null, 1]},\n                    steps: [\n                        {range: [0, 0.5], color: \"lightgray\"},\n                        {range: [0.5, 1], color: \"red\"} \n                    ]\n                }\n            }\n        ];\n        var layout = {\n            title: \"Risk Gauge\"\n        };\n        Plotly.newPlot(\"gauge\", data, layout);\n    <\/script>\n    <h2>Top 10 Dimensions by Absolute Magnitude</h2>\n    <div id=\"bar-chart\" style=\"width:480px;height:400px;\"></div>\n    <script>\n        var dimensions = [\n            {name: \"Dimension 1\", value: 10},\n            {name: \"Dimension 2\", value: 9},\n            {name: \"Dimension 3\", value: 8},\n            {name: \"Dimension 4\", value: 7},\n            {name: \"Dimension 5\", value: 6},\n            {name: \"Dimension 6\", value: 5},\n            {name: \"Dimension 7\", value: 4},\n            {name: \"Dimension 8\", value: 3},\n            {name: \"Dimension 9\", value: 2},\n            {name: \"Dimension 10\", value: 1}\n        ];\n        var barData = [{\n            x: dimensions.map(d => d.name),\n            y: dimensions.map(d => d.value),\n            type: 'bar'\n        }];\n        var barLayout = {\n            title: \"Top 10 Dimensions by Absolute Magnitude\",\n            xaxis: {title: 'Dimensions'},\n            yaxis: {title: 'Magnitude'}\n        };\n        Plotly.newPlot(\"bar-chart\", barData, barLayout);\n    <\/script>\n</body>\n</html>\n
