<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <title>Drift Analysis</title>
</head>
<body>
    <h1>Drift Analysis Dashboard</h1>
    <h2>Entropy Trajectory</h2>
    <div id="entropy-trajectory"></div>

    <h2>Drift Score Heatmap</h2>
    <div id="drift-heatmap"></div>

    <h2>Regime Change Detection</h2>
    <div id="regime-change"></div>

    <h2>Summary Statistics</h2>
    <div id="summary-statistics">
        <table border="1">
            <tr>
                <th>Statistic</th>
                <th>Value</th>
            </tr>
            <tr>
                <td>Mean</td>
                <td><!-- Mean Value --></td>
            </tr>
            <tr>
                <td>Standard Deviation</td>
                <td><!-- Standard Deviation Value --></td>
            </tr>
            <tr>
                <td>Min</td>
                <td><!-- Minimum Value --></td>
            </tr>
            <tr>
                <td>Max</td>
                <td><!-- Maximum Value --></td>
            </tr>
        </table>
    </div>

    <script>
        // Sample Data for Plotly Charts
        const entropyData = [/* Your Entropy Trajectory Data */];
        const driftData = [/* Your Drift Score Heatmap Data */];
        const regimeData = [/* Your Regime Change Detection Data */];

        // Plotly Entropy Trajectory
        const entropyTrace = {
            x: entropyData.map(d => d.x),
            y: entropyData.map(d => d.y),
            type: 'scatter',
            mode: 'lines',
            name: 'Entropy Trajectory'
        };

        Plotly.newPlot('entropy-trajectory', [entropyTrace]);

        // Plotly Drift Score Heatmap
        const heatmapTrace = {
            z: driftData,
            type: 'heatmap'
        };

        Plotly.newPlot('drift-heatmap', [heatmapTrace]);

        // Plotly Regime Change Detection
        const regimeTrace = {
            x: regimeData.map(d => d.x),
            y: regimeData.map(d => d.y),
            type: 'scatter',
            mode: 'lines+markers',
            name: 'Regime Change'
        };

        Plotly.newPlot('regime-change', [regimeTrace]);

        // Populate Summary Statistics
        // This would usually be populated with actual data dynamically
    </script>
</body>
</html>
