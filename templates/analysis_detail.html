<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysis {{ analysis.id }}</title>
</head>
<body>
    <h1>Analysis {{ analysis.id }}</h1>

    <p><strong>Timestamp:</strong> {{ analysis.timestamp }}</p>
    <p><strong>Risk:</strong> {{ analysis.risk }}</p>
    <p><strong>Regime Class:</strong> {{ analysis.regime_class }}</p>
    <p><strong>Entropy:</strong> {{ analysis.entropy }}</p>
    <p><strong>Transition Density:</strong> {{ analysis.transition_density }}</p>

    <h2>Sequence</h2>
    <pre>{{ analysis.sequence }}</pre>

    <p><a href="/">Back to Dashboard</a></p>
</body>
</html>
